<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Empire Web World Planner</title>
    <style>
        :root {
            /* Design tokens for consistent UI theming */
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --accent: #3b82f6;
            --text-main: #e5e7eb;
            --border: #374151;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Loading Overlay --- */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .loader-container {
            width: 300px;
            text-align: center;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #2d2d2d;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.2s ease;
        }

        #loadingText {
            font-size: 0.9rem;
            color: var(--text-main);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Sidebar & Controls --- */
        .sidebar {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: hidden;
            overflow-x: hidden;
        }

        h4 {
            margin: 6px 0 6px 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #9ca3af;
        }

        /* UI Elements */
        .dual-control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .trip-control-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
        }

        select,
        button,
        input[type="text"] {
            width: 100%;
            padding: 8px;
            background: #2d2d2d;
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        input[type="number"] {
            width: 10%;
            padding: 8px;
            background: #2d2d2d;
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 3px;
            align-content: center;
        }

        button {
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #404040;
        }

        button.active {
            background: var(--accent);
            border-color: white;
            font-weight: bold;
        }

        /* --- Asset Palette --- */
        #tileSearch {
            background: #111;
            border-color: var(--accent);
            width: 90%;
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            background: #111;
            padding: 8px;
            border-radius: 4px;
            max-height: 220px;
            overflow-x: hidden;
            overflow-y: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .palette img,
        .palette .color-tile {
            width: 100%;
            aspect-ratio: 1;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 2px;
        }

        .palette img.selected,
        .palette .color-tile.selected {
            border-color: var(--accent);
        }

        .color-tile {
            display: inline-block;
        }

        /* Viewport */
        .viewport {
            position: relative;
            overflow: hidden;
            background: #0f0f0f;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            background-color: #1a1a1a;
        }

        /* Floating Info Panels */
        .info {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--panel-bg);
            border: 2px solid var(--accent);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 250px;
            text-align: center;
        }

        #coordDisplay {
            color: #10b981;
            font-family: monospace;
            height: auto;
            align-self: center;
            margin: 0px;
        }

        .palette::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        /* --- Photo Processor Modal --- */
        #photoModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 11000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            width: 600px;
            max-width: 95vw;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-content h3 {
            margin-top: 0;
            color: var(--accent);
        }

        .preview-container {
            width: 100%;
            height: 350px;
            background: #111;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Changed to hidden for pan/zoom control */
            position: relative;
            cursor: grab;
        }

        .preview-container:active {
            cursor: grabbing;
        }

        #photoPreviewCanvas {
            image-rendering: pixelated;
            background-color: #1a1a1a;
            transform-origin: center center;
            transition: transform 0.05s linear;
        }

        .input-group-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            margin-left: 15px;
        }

        .input-group-row label {
            font-size: 0.8rem;
            color: #9ca3af;
            min-width: 60px;
        }

        .ratio-container {
            margin-left: auto;
            display: flex;
            align-items: flex-end;
            margin-right: 15px;
            margin-left: 15px;
            gap: 20px;
        }

        #ratioDisplay,
        #originalRatioDisplay {
            font-family: monospace;
            font-size: 0.75rem;
        }

        #ratioDisplay {
            color: var(--accent);
            font-weight: bold;
        }

        #originalRatioDisplay {
            color: #6b7280;
        }
    </style>
</head>

<body>

    <div id="loadingOverlay">
        <div class="loader-container">
            <h2 id="loadingText">Initializing World Planner...</h2>
            <div class="progress-bar-bg">
                <div id="progressBar"></div>
            </div>
        </div>
    </div>

    <div id="photoModal">
        <div class="modal-content">
            <h3>Photo to Blocks Conversion</h3>
            <div class="preview-container" id="photoPreviewContainer">
                <canvas id="photoPreviewCanvas"></canvas>
            </div>

            <div class="input-group-row">
                <label>Width:</label>
                <input type="number" id="targetW" value="20" min="1" max="100" oninput="handleDimensionChange('w')">
                <label style="margin-left: 10px">Height:</label>
                <input type="number" id="targetH" value="57" min="1" max="60" oninput="handleDimensionChange('h')">

                <div class="ratio-container">
                    <span id="ratioDisplay">Current Ratio: 1:1</span>
                    <span id="originalRatioDisplay">Original: --</span>
                </div>
            </div>

            <div class="dual-control-row">
                <button id="lockRatioBtn" onclick="toggleRatioLock()">Lock Ratio: Off</button>
                <button onclick="updateConversionPreview()">Update Render</button>
            </div>
            <div class="dual-control-row">
                <button onclick="confirmPhotoImport()">Confirm & Paste</button>
                <button onclick="closePhotoModal()">Exit</button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="control-group">
            <h4>Tools & Layers</h4>
            <button id="layerSelect" onclick="toggleLayer()">Block Layer</button>
            <div class="trip-control-row">
                <button id="btnBrush" onclick="setTool('brush')">Brush</button>
                <button id="btnBucket" onclick="setTool('bucket')">Fill</button>
                <button id="btnPan" class="active" onclick="setTool('pan')">Pan</button>
            </div>
            <div class="trip-control-row">
                <button id="btnSelect" onclick="setTool('select')">Select</button>
            </div>

            <h4>Brush Size</h4>
            <select id="brushSize">
                <option value="1">1x1</option>
                <option value="2">2x2</option>
                <option value="3">3x3</option>
                <option value="4">4x4</option>
                <option value="5">5x5</option>
            </select>
        </div>

        <div class="control-group">
            <h4>Blocks</h4>
            <input type="text" id="tileSearch" placeholder="Search tiles..." oninput="filterTiles()">
            <div id="tilePalette" class="palette"></div>
            <div class="dual-control-row" style="margin-top:5px">
                <button id="rotation" onclick="rotateTile()">Rot: 0°</button>
                <button id="mirror" onclick="flipTile()">Mirror: Off</button>
            </div>
            <button onclick="document.getElementById('tileUpload').click()">Import Custom Blocks</button>
            <input type="file" id="tileUpload" accept="image/*" multiple style="display:none">

            <button id="btnPhotoImportTrigger" onclick="document.getElementById('photoImport').click()"
                style="display: none;">Photo to Blocks</button>
            <input type="file" id="photoImport" accept="image/*" style="display:none">
        </div>

        <div class="control-group">
            <h4>World Settings</h4>
            <div class="dual-control-row">
                <button onclick="toggleGrid()">Toggle Grid</button>
                <button onclick="clearMap()">Clear World</button>
            </div>
            <button onclick="addBedrockLayers()">Add Bedrock Layer</button>
            <button onclick="saveAsPNG()">Save World Image</button>
            <button onclick="document.getElementById('bgUpload').click()">Set World BG Image</button>
            <input type="file" id="bgUpload" accept="image/*" style="display:none">
            <button onclick="exportMapFile()">Export World Data</button>
            <button onclick="document.getElementById('mapImport').click()">Import World Data</button>
            <input type="file" id="mapImport" accept=".map" style="display:none">
            <button onclick="exportTileList()">Export Block List</button>
            <div class="dual-control-row">
                <button onclick="showWebsiteInfo()">Info</button>
                <button onclick="showKeybind()">Keybind</button>
            </div>
        </div>
        <h4 id="coordDisplay">Tile Position: (0, 0)</h4>
    </aside>

    <main class="viewport">
        <canvas id="mainCanvas"></canvas>

        <div class="info" id="myForm">
            <h4 style="color: var(--accent);"><span id="headerText"></span></h4>
            <p style="font-size: 0.9rem; line-height: 1.4;"><span id="bodyText"></span></p>
            <h4 style="color: var(--accent);"><span id="endText"></span></h4>
            <button onclick="showInfo()">Close</button>
        </div>
    </main>

    <script>
        /******************************************************************
        * 1. GLOBAL CONSTANTS & CACHED DOM ELEMENTS
        ******************************************************************/
        const COLS = 100, ROWS = 60, TILE_SIZE = 34;
        const SHADOW_OFFSET = 9;
        const STORAGE_KEY = 'gridEmpire_cachedMap';

        // DOM Elements
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const viewport = document.querySelector('.viewport');
        const coordDisplay = document.getElementById('coordDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const progressBar = document.getElementById('progressBar');
        const tilePalette = document.getElementById('tilePalette');
        const brushSizeSelect = document.getElementById('brushSize');
        const tileSearchInput = document.getElementById('tileSearch');
        const rotationBtn = document.getElementById('rotation');
        const mirrorBtn = document.getElementById('mirror');
        const layerSelectBtn = document.getElementById('layerSelect');
        const btnBrush = document.getElementById('btnBrush');
        const btnBucket = document.getElementById('btnBucket');
        const btnPan = document.getElementById('btnPan');
        const btnSelect = document.getElementById('btnSelect');
        const infoForm = document.getElementById('myForm');
        const headerTextEl = document.getElementById('headerText');
        const bodyTextEl = document.getElementById('bodyText');
        const endTextEl = document.getElementById('endText');
        const mapImport = document.getElementById('mapImport');
        const bgUpload = document.getElementById('bgUpload');
        const tileUpload = document.getElementById('tileUpload');

        /* Photo Processing State */
        let activeProcessingImg = null;
        let currentProcessedTiles = [];
        const photoModal = document.getElementById('photoModal');
        const previewCanvas = document.getElementById('photoPreviewCanvas');
        const previewContainer = document.getElementById('photoPreviewContainer');
        const pCtx = previewCanvas.getContext('2d');
        const targetWInput = document.getElementById('targetW');
        const targetHInput = document.getElementById('targetH');
        const ratioDisplay = document.getElementById('ratioDisplay');
        const originalRatioDisplay = document.getElementById('originalRatioDisplay');
        const lockRatioBtn = document.getElementById('lockRatioBtn');
        const btnPhotoImportTrigger = document.getElementById('btnPhotoImportTrigger');
        const photoImport = document.getElementById('photoImport');

        // Setup Main Canvas
        canvas.width = COLS * TILE_SIZE;
        canvas.height = ROWS * TILE_SIZE;

        // Offscreen buffer for shadow compositing
        const shadowCanvas = document.createElement('canvas');
        const shadowCtx = shadowCanvas.getContext('2d');

        /** --- Application State --- */
        let mapData = { background: {}, foreground: {}, water: {} };
        let history = [], redoStack = [];
        let selectedTileData = null;
        let currentLayer = "foreground";
        let tool = 'pan';

        /* Transform & UI State */
        let zoom = 1.00, rotation = 0, flipped = false, showGrid = true;
        let isGKeyPressed = false, hasScrolledWithG = false, gridParts = 0, maxDivision = 20;
        let panX = 0, panY = 0;
        let lastX = null, lastY = null;
        let currentMouseX = 0, currentMouseY = 0;
        let isInfoVisible = false;
        let bgImage = new Image();

        const imgCache = {}; // Global store for loaded Image objects
        const tileNameLookup = {}; // Maps data URLs to their readable names
        const autotileMap = {}; // Maps base tile names to their autotile variants { "Dirt Block": { "85": "dataURL" } }
        let saveTimeout = null;

        /* Selection & Clipboard State */
        let selectionRect = null;
        let isSelecting = false;
        let clipboard = null;
        let showPastePreview = false;

        // Modal Preview Transform State
        let pZoom = 1.0, pPanX = 0, pPanY = 0;
        let isPanningPhoto = false;
        let isRatioLocked = false;
        let originalImgRatio = 1.0;


        /******************************************************************
         * 2. INITIALIZATION
         ******************************************************************/

        initApp();
        // Initialize Photo Controls on load
        initPhotoPreviewControls();

        async function initApp() {
            try {
                await loadSpritesheets((progress) => {
                    progressBar.style.width = `${progress * 0.8}%`;
                    loadingText.innerText = `Loading Assets: ${Math.round(progress)}%`;
                });

                loadingText.innerText = "Setting Up Environment...";
                await new Promise((resolve) => {
                    bgImage.src = 'backgrounds/GE_spring_background.jpg';
                    bgImage.onload = resolve;
                    bgImage.onerror = () => {
                        console.log("Default background not found.");
                        resolve();
                    };
                });
                progressBar.style.width = '90%';

                loadingText.innerText = "Restoring World Data...";
                if (!loadFromCache()) addBedrockLayers();

                await prewarmMapCache();
                await updateTransform();
                await draw();

                progressBar.style.width = '100%';

                setTimeout(() => {
                    hideLoading();
                    showWebsiteInfo();
                }, 400);

            } catch (err) {
                loadingText.innerText = "Error Loading Assets. Please Refresh.";
                console.error(err);
            }
        }

        /** * Pre-decodes and renders all tiles currently in the map.
         * Prevents visual "pop-in" or missing shadows on the initial frame.
         */
        async function prewarmMapCache() {
            const promises = [];
            const layers = [mapData.background, mapData.foreground, mapData.water];
            const pCanvas = document.createElement('canvas');
            pCanvas.width = pCanvas.height = TILE_SIZE;
            const pCtx = pCanvas.getContext('2d');

            layers.forEach(layer => {
                for (let coord in layer) {
                    const [x, y] = coord.split(',').map(Number);
                    const tile = layer[coord];
                    // Resolve autotile source
                    const src = getAutotiledSrc(x, y, layer) || tile.src;

                    if (!imgCache[src]) {
                        const img = new Image();
                        img.src = src;
                        imgCache[src] = img;

                        promises.push(img.decode().then(() => {
                            // Draw once to force GPU upload
                            pCtx.drawImage(img, 0, 0, TILE_SIZE, TILE_SIZE);
                        }).catch(() => { }));
                    }
                }
            });
            return Promise.all(promises);
        }

        /** * Sequentially fetches and processes spritesheet metadata and images.
         * Continues until a fetch fails (suggesting no more sheets exist).
         * @param {Function} onProgress - Callback for loading bar updates.
         */
        async function loadSpritesheets(onProgress) {
            tilePalette.innerHTML = '';
            let index = 1;

            const pCanvas = document.createElement('canvas');
            pCanvas.width = pCanvas.height = TILE_SIZE;
            const pCtx = pCanvas.getContext('2d');

            while (true) {
                try {
                    const response = await fetch(`spritesheet${index}.json`);
                    if (!response.ok) break;

                    const data = await response.json();
                    const spriteImg = new Image();
                    spriteImg.crossOrigin = "anonymous";
                    spriteImg.src = data.meta.image || `spritesheet${index}.png`;
                    await spriteImg.decode();

                    const tempCanvas = document.createElement('canvas');
                    const tCtx = tempCanvas.getContext('2d');
                    const frames = Object.entries(data.frames).sort((a, b) => a[1].index - b[1].index);

                    for (const [name, info] of frames) {
                        const { x, y, w, h } = info.frame;
                        if (w === 0 || h === 0) continue;

                        tempCanvas.width = w; tempCanvas.height = h;
                        tCtx.clearRect(0, 0, w, h);
                        tCtx.drawImage(spriteImg, x, y, w, h, 0, 0, w, h);

                        const dataUrl = tempCanvas.toDataURL();
                        tileNameLookup[dataUrl] = name;

                        // Identify Autotile Variants (e.g., "Dirt Block_85")
                        const nameMatches = name.match(/^(.*)_(\d+)$/);

                        if (nameMatches) {
                            const baseName = nameMatches[1];
                            const mask = nameMatches[2];

                            if (!autotileMap[baseName]) autotileMap[baseName] = {};
                            autotileMap[baseName][mask] = dataUrl;

                            // Cache the image, but do NOT add it to the visible tilePalette
                            const cachedImg = new Image();
                            cachedImg.src = dataUrl;
                            imgCache[dataUrl] = cachedImg;
                            await cachedImg.decode();
                        } else {
                            // Standard tile processing
                            const img = document.createElement('img');
                            img.src = dataUrl;
                            img.title = name;
                            img.onclick = () => selectTile(img.src, img);
                            tilePalette.appendChild(img);

                            const cachedImg = new Image();
                            cachedImg.src = dataUrl;
                            imgCache[dataUrl] = cachedImg;
                            await cachedImg.decode();
                            pCtx.drawImage(cachedImg, 0, 0, TILE_SIZE, TILE_SIZE);
                        }
                    }

                    if (onProgress) onProgress(index * 10);
                    index++;
                } catch (err) { break; }
            }
        }

        /******************************************************************
         * 3. RENDERING ENGINE & AUTOTILING
         ******************************************************************/

        /**
         * Evaluates adjacency and computes the bitmask for autotiling.
         * Supports both 8-bit (47-tile "Blob") and 4-bit (16-tile "Cardinal") sets.
         * * # 8-neighbor bitmask values (Powers of 2)
         * # 1: NW, 2: N, 4: NE, 8: W, 16: E, 32: SW, 64: S, 128: SE
         * * @param {number} x - The x coordinate on the grid
         * @param {number} y - The y coordinate on the grid
         * @param {Object} layerObj - The current map layer dictionary
         * @returns {string} The source data URL of the autotiled variant or base tile
         */
        function getAutotiledSrc(x, y, layerObj) {
            const tile = layerObj[`${x},${y}`];
            if (!tile) return null;

            const baseSrc = tile.src;
            const tileName = tileNameLookup[baseSrc];

            // If this tile doesn't have autotile variants, return the standard base source
            if (!tileName || !autotileMap[tileName]) return baseSrc;

            const variants = autotileMap[tileName];

            /**
             * Determine which bits are supported by this specific tile type.
             */
            const variantKeys = Object.keys(variants).map(Number);
            let supportedMask = 0;
            for (let i = 0; i < variantKeys.length; i++) {
                supportedMask |= variantKeys[i];
            }

            /*
            * Helper to verify matching adjacent block.
            */
            const isRelevantNeighbor = (nx, ny, bit) => {
                // If the autotileMap for this tile never uses this bit, ignore the neighbor
                if (!(supportedMask & bit)) return false;

                const nTile = layerObj[`${nx},${ny}`];
                return nTile && nTile.src === baseSrc;
            };

            // Cardinal neighbors - only true if neighbor matches AND tile supports the direction
            const N = isRelevantNeighbor(x, y - 1, 2);
            const W = isRelevantNeighbor(x - 1, y, 8);
            const E = isRelevantNeighbor(x + 1, y, 16);
            const S = isRelevantNeighbor(x, y + 1, 64);

            // Corner neighbors - only true if neighbor matches AND tile supports the direction
            const NW = isRelevantNeighbor(x - 1, y - 1, 1);
            const NE = isRelevantNeighbor(x + 1, y - 1, 4);
            const SW = isRelevantNeighbor(x - 1, y + 1, 32);
            const SE = isRelevantNeighbor(x + 1, y + 1, 128);

            // 1. Calculate the 4-bit Cardinal Mask (N=2, W=8, E=16, S=64)
            let cardinalMask = 0;
            if (N) cardinalMask |= 2;
            if (W) cardinalMask |= 8;
            if (E) cardinalMask |= 16;
            if (S) cardinalMask |= 64;

            // 2. Calculate the 8-bit Full Mask (Adding corner constraints)
            let fullMask = cardinalMask;
            if (NW && N && W) fullMask |= 1;
            if (NE && N && E) fullMask |= 4;
            if (SW && S && W) fullMask |= 32;
            if (SE && S && E) fullMask |= 128;

            // 3. Lookup Strategy: Try 8-bit first, fallback to 4-bit
            let finalSrc = variants[fullMask] || variants[cardinalMask];

            // Return the specific autotile variant if it exists, otherwise fallback to base
            return finalSrc || baseSrc;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (bgImage && bgImage.complete && bgImage.naturalWidth > 0) {
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            }

            renderLayer(mapData.background);
            renderShadowLayer(mapData.foreground);
            renderLayer(mapData.foreground);
            renderLayer(mapData.water);

            if (tool === 'select' && showPastePreview && clipboard) renderGhostSelection();
            if (showGrid) drawGridOverlay();
            if (selectionRect) drawSelectionRect();
        }

        /** Draws the dynamic grid, supporting subdivisional scaling. */
        function drawGridOverlay() {
            ctx.strokeStyle = "rgba(0, 0, 0, 0.3)";
            ctx.setLineDash([]);
            ctx.beginPath();

            if (gridParts === 0) {
                for (let i = 0; i <= COLS; i++) { ctx.moveTo(i * TILE_SIZE, 0); ctx.lineTo(i * TILE_SIZE, canvas.height); }
                for (let j = 0; j <= ROWS; j++) { ctx.moveTo(0, j * TILE_SIZE); ctx.lineTo(canvas.width, j * TILE_SIZE); }
            } else {
                const drawnX = new Set();
                const drawnY = new Set();

                for (let i = 1; i < gridParts; i++) {
                    const tileX = Math.round((COLS * i) / gridParts);
                    if (tileX > 0 && tileX < COLS && !drawnX.has(tileX)) {
                        drawnX.add(tileX);
                        ctx.moveTo(tileX * TILE_SIZE, 0);
                        ctx.lineTo(tileX * TILE_SIZE, canvas.height);
                    }

                    const tileY = Math.round((ROWS * i) / gridParts);
                    if (tileY > 0 && tileY < ROWS && !drawnY.has(tileY)) {
                        drawnY.add(tileY);
                        ctx.moveTo(0, tileY * TILE_SIZE);
                        ctx.lineTo(canvas.width, tileY * TILE_SIZE);
                    }
                }
            }
            ctx.stroke();
        }

        function drawSelectionRect() {
            const x = Math.min(selectionRect.x1, selectionRect.x2) * TILE_SIZE;
            const y = Math.min(selectionRect.y1, selectionRect.y2) * TILE_SIZE;
            const w = (Math.abs(selectionRect.x2 - selectionRect.x1) + 1) * TILE_SIZE;
            const h = (Math.abs(selectionRect.y2 - selectionRect.y1) + 1) * TILE_SIZE;
            ctx.strokeStyle = '#3b82f6';
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
            ctx.fillRect(x, y, w, h);
            ctx.setLineDash([]);
        }

        /** * Renders a unified shadow map for a layer.
         * Uses a black silhouette and globalAlpha to prevent darkening where tiles overlap.
         */
        function renderShadowLayer(layer) {
            if (!layer || Object.keys(layer).length === 0) return;

            shadowCanvas.width = canvas.width;
            shadowCanvas.height = canvas.height;
            shadowCtx.clearRect(0, 0, shadowCanvas.width, shadowCanvas.height);

            for (let coord in layer) {
                const [x, y] = coord.split(',').map(Number);
                const tile = layer[coord];

                const srcToRender = getAutotiledSrc(x, y, layer) || tile.src;
                const img = imgCache[srcToRender];

                if (!img || img.naturalWidth === 0) continue;

                shadowCtx.save();
                shadowCtx.translate(
                    x * TILE_SIZE + TILE_SIZE / 2 + SHADOW_OFFSET,
                    y * TILE_SIZE + TILE_SIZE / 2 + SHADOW_OFFSET
                );
                shadowCtx.rotate((tile.rotation * Math.PI) / 180);
                shadowCtx.scale(tile.flipped ? -1 : 1, 1);
                shadowCtx.drawImage(img, -TILE_SIZE / 2, -TILE_SIZE / 2, TILE_SIZE, TILE_SIZE);
                shadowCtx.restore();
            }

            shadowCtx.globalCompositeOperation = 'source-in';
            shadowCtx.fillStyle = 'black';
            shadowCtx.fillRect(0, 0, shadowCanvas.width, shadowCanvas.height);
            shadowCtx.globalCompositeOperation = 'source-over';

            ctx.save();
            ctx.globalAlpha = 0.1;
            ctx.drawImage(shadowCanvas, 0, 0);
            ctx.restore();
        }

        /** Renders a standard tile layer with rotation and flipping. */
        async function renderLayer(layer) {
            if (!layer) return;
            for (let coord in layer) {
                const [x, y] = coord.split(',').map(Number);
                const tile = layer[coord];

                const srcToRender = getAutotiledSrc(x, y, layer) || tile.src;

                // Cache logic with safety for broken images
                if (!imgCache[srcToRender]) {
                    const img = new Image();
                    img.src = srcToRender;
                    imgCache[srcToRender] = img;
                    // Note: We don't await here to keep rendering performance high; 
                    // prewarmMapCache handles the initial loading.
                }

                const cachedImg = imgCache[srcToRender];
                if (!cachedImg || cachedImg.naturalWidth === 0) continue;

                ctx.save();
                ctx.translate(x * TILE_SIZE + TILE_SIZE / 2, y * TILE_SIZE + TILE_SIZE / 2);
                ctx.rotate((tile.rotation * Math.PI) / 180);
                ctx.scale(tile.flipped ? -1 : 1, 1);
                ctx.drawImage(cachedImg, -TILE_SIZE / 2, -TILE_SIZE / 2, TILE_SIZE, TILE_SIZE);
                ctx.restore();
            }
        }

        /** Previews the clipboard contents at 50% opacity, centered on the cursor. */
        async function renderGhostSelection() {
            if (!clipboard) return;
            const centerOffsetX = Math.floor(clipboard.width / 2);
            const centerOffsetY = Math.floor(clipboard.height / 2);

            ctx.save();
            ctx.globalAlpha = 0.5;
            for (const tile of clipboard.tiles) {
                if (!tile.data) continue;
                const targetX = currentMouseX + tile.offsetX - centerOffsetX;
                const targetY = currentMouseY + tile.offsetY - centerOffsetY;

                // Bounds check for rendering performance
                if (targetX < 0 || targetX >= COLS || targetY < 0 || targetY >= ROWS) continue;

                const srcToRender = tile.data.src; // Keep clipboard preview simple using base src

                if (!imgCache[srcToRender]) {
                    const img = new Image();
                    img.src = srcToRender;
                    imgCache[srcToRender] = img;
                }

                const cachedImg = imgCache[srcToRender];
                if (cachedImg && cachedImg.complete && cachedImg.naturalWidth > 0) {
                    ctx.save();
                    ctx.translate(targetX * TILE_SIZE + TILE_SIZE / 2, targetY * TILE_SIZE + TILE_SIZE / 2);
                    ctx.rotate((tile.data.rotation * Math.PI) / 180);
                    ctx.scale(tile.data.flipped ? -1 : 1, 1);
                    ctx.drawImage(cachedImg, -TILE_SIZE / 2, -TILE_SIZE / 2, TILE_SIZE, TILE_SIZE);
                    ctx.restore();
                }
            }
            ctx.restore();
        }

        /******************************************************************
         * 4. TOOL LOGIC
         ******************************************************************/

        /** Switches the active tool and updates cursor/UI state. */
        function setTool(t) {
            tool = t;
            showPastePreview = false;

            btnBrush.classList.toggle('active', t === 'brush');
            btnBucket.classList.toggle('active', t === 'bucket');
            btnPan.classList.toggle('active', t === 'pan');
            btnSelect.classList.toggle('active', t === 'select');

            if (t !== 'select') selectionRect = null;
            canvas.style.cursor = (t === 'pan') ? 'grab' : 'crosshair';
            draw();
        }

        /** Standard flood fill algorithm for the Bucket tool. */
        function floodFill(startX, startY) {
            const layer = mapData[currentLayer];
            const target = layer[`${startX},${startY}`]?.src || null;
            if (target === selectedTileData) return;

            const queue = [[startX, startY]];
            while (queue.length > 0) {
                const [x, y] = queue.shift();
                const key = `${x},${y}`;
                if (x < 0 || x >= COLS || y < 0 || y >= ROWS) continue;
                if ((layer[key]?.src || null) !== target) continue;

                layer[key] = { src: selectedTileData, rotation, flipped };
                queue.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }
            saveToCache();
        }

        function placeBrush(startX, startY, layer, buttons) {
            const size = parseInt(brushSizeSelect.value);
            const offset = Math.floor(size / 2);

            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const x = startX + i - offset;
                    const y = startY + j - offset;
                    if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
                        if (buttons === 1 && selectedTileData) {
                            mapData[layer][`${x},${y}`] = { src: selectedTileData, rotation, flipped };
                        } else if (buttons === 2) {
                            delete mapData[layer][`${x},${y}`];
                        }
                    }
                }
            }
        }

        function copySelection() {
            if (!selectionRect) return;
            const xMin = Math.min(selectionRect.x1, selectionRect.x2);
            const xMax = Math.max(selectionRect.x1, selectionRect.x2);
            const yMin = Math.min(selectionRect.y1, selectionRect.y2);
            const yMax = Math.max(selectionRect.y1, selectionRect.y2);

            const width = xMax - xMin + 1;
            const height = yMax - yMin + 1;

            const tiles = [];
            const layer = mapData[currentLayer];

            for (let x = xMin; x <= xMax; x++) {
                for (let y = yMin; y <= yMax; y++) {
                    const key = `${x},${y}`;
                    tiles.push({
                        offsetX: x - xMin,
                        offsetY: y - yMin,
                        data: layer[key] ? { ...layer[key] } : null
                    });
                }
            }

            if (tiles.length > 0) {
                clipboard = { tiles, originX: xMin, originY: yMin, width, height };
                showPastePreview = true;
                draw();
            }
        }

        function cutSelection() {
            if (!selectionRect) return;
            copySelection();
            saveState();
            const xMin = Math.min(selectionRect.x1, selectionRect.x2);
            const xMax = Math.max(selectionRect.x1, selectionRect.x2);
            const yMin = Math.min(selectionRect.y1, selectionRect.y2);
            const yMax = Math.max(selectionRect.y1, selectionRect.y2);

            const layer = mapData[currentLayer];
            for (let x = xMin; x <= xMax; x++) {
                for (let y = yMin; y <= yMax; y++) {
                    delete layer[`${x},${y}`];
                }
            }
            draw(); saveToCache();
        }

        function pasteSelection() {
            if (!clipboard) return;
            const targetX = currentMouseX - Math.floor(clipboard.width / 2);
            const targetY = currentMouseY - Math.floor(clipboard.height / 2);

            saveState();
            clipboard.tiles.forEach(tile => {
                const px = targetX + tile.offsetX;
                const py = targetY + tile.offsetY;
                if (px >= 0 && px < COLS && py >= 0 && py < ROWS) {
                    if (tile.data) {
                        mapData[currentLayer][`${px},${py}`] = { ...tile.data };
                    } else {
                        delete mapData[currentLayer][`${px},${py}`];
                    }
                }
            });
            draw(); saveToCache();
        }

        function rotateTile() {
            rotation = (rotation + 90) % 360;
            rotationBtn.innerText = `Rot: ${rotation}°`;
        }

        function flipTile() {
            flipped = !flipped;
            mirrorBtn.innerText = `Mirror: ${flipped ? "On" : "Off"}`;
        }

        function toggleLayer() {
            const layers = ["foreground", "background", "water"];
            const labels = { foreground: "Block", background: "BG", water: "Water" };
            const idx = (layers.indexOf(currentLayer) + 1) % layers.length;
            currentLayer = layers[idx];
            layerSelectBtn.innerText = `${labels[currentLayer]} Layer`;
            selectionRect = null;
            draw();
        }

        function clearMap() {
            if (confirm("Clear?")) {
                saveState();
                mapData = { background: {}, foreground: {}, water: {} };
                addBedrockLayers();
                saveToCache();
            }
        }

        function addBedrockLayers() {
            saveState();
            const paletteItems = document.querySelectorAll('#tilePalette img');
            let bedrockSrc = null;

            paletteItems.forEach(img => {
                if (img.title.toLowerCase() === 'bedrock') {
                    bedrockSrc = img.src;
                }
            });

            if (!bedrockSrc) {
                console.log("Bedrock tile not found.");
                draw();
                return;
            }

            for (let x = 0; x < COLS; x++) {
                for (let y = ROWS - 3; y < ROWS; y++) {
                    mapData.foreground[`${x},${y}`] = {
                        src: bedrockSrc,
                        rotation: 0,
                        flipped: false
                    };
                }
            }
            draw(); saveToCache();
        }

        function filterTiles() {
            const query = tileSearchInput.value.toLowerCase();
            document.querySelectorAll('.palette img').forEach(el => {
                const name = (el.title || "").toLowerCase();
                el.style.display = name.includes(query) ? 'block' : 'none';
            });
        }

        function selectTile(src, el) {
            document.querySelectorAll('.palette img, .palette .color-tile').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedTileData = src;
        }

        function toggleGrid() { showGrid = !showGrid; gridParts = 0; draw(); }

        function changeZoom(delta, e) {
            const oldZoom = zoom;
            zoom = Math.min(Math.max(0.4, zoom + delta), 10);
            if (e) {
                const vRect = viewport.getBoundingClientRect();
                const mouseX = e.clientX - (vRect.left + vRect.width / 2);
                const mouseY = e.clientY - (vRect.top + vRect.height / 2);
                const ratio = zoom / oldZoom;
                panX = mouseX - (mouseX - panX) * ratio;
                panY = mouseY - (mouseY - panY) * ratio;
            }
            updateTransform();
        }

        function updateTransform() {
            canvas.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${zoom})`;
        }


        /******************************************************************
         * 5. INPUT HANDLING
         ******************************************************************/
        function handleInput(e) {
            const vRect = viewport.getBoundingClientRect();
            const centerX = vRect.width / 2, centerY = vRect.height / 2;

            /* Translate screen space to canvas space, accounting for Pan and Zoom */
            const localX = (e.clientX - (vRect.left + centerX + panX)) / zoom + (canvas.width / 2);
            const localY = (e.clientY - (vRect.top + centerY + panY)) / zoom + (canvas.height / 2);
            const mouseX = Math.floor(localX / TILE_SIZE);
            const mouseY = Math.floor(localY / TILE_SIZE);

            currentMouseX = mouseX; currentMouseY = mouseY;

            if (mouseX >= 0 && mouseX < COLS && mouseY >= 0 && mouseY < ROWS) {
                coordDisplay.innerText = `Tile Position: (${mouseX}, ${(ROWS - 1) - mouseY})`;
            }

            /* --- Tool Logic --- */

            // Eyedropper: Samples base tile data from the current layer
            if (e.altKey && e.buttons === 1 && e.type === 'mousedown') {
                const tile = mapData[currentLayer][`${mouseX},${mouseY}`];
                if (tile) {
                    // Note: tile.src maintains the actual base tile, bypassing the autotiled view logic
                    selectedTileData = tile.src;
                    rotation = tile.rotation;
                    flipped = tile.flipped;

                    rotationBtn.innerText = `Rot: ${rotation}°`;
                    mirrorBtn.innerText = `Mirror: ${(flipped) ? "On" : "Off"}`;

                    // Highlight in palette
                    const paletteItems = document.querySelectorAll('.palette img, .palette .color-tile');
                    paletteItems.forEach(el => {
                        el.classList.toggle('selected', el.src === tile.src);
                        if (el.src === tile.src) el.scrollIntoView({ block: 'nearest' });
                    });

                    // Force brush tool for immediate use
                    setTool('brush');
                }
                return;
            }

            if (tool === 'pan' && e.buttons === 1) {
                canvas.style.cursor = 'grabbing';
                panX += e.movementX;
                panY += e.movementY;
                updateTransform();
                return;
            } else if (tool === 'pan') {
                canvas.style.cursor = 'grab';
                return;
            }

            if (tool === 'select') {
                if (e.type === 'mousedown' && e.buttons === 1) {
                    if (showPastePreview && clipboard) {
                        pasteSelection();
                        return; // Exit early to prevent starting a new selection box on the same click
                    }
                    isSelecting = true;
                    selectionRect = { x1: mouseX, y1: mouseY, x2: mouseX, y2: mouseY };
                    showPastePreview = false; // Hide ghost when starting new selection
                } else if (isSelecting && e.type === 'mousemove') {
                    selectionRect.x2 = mouseX;
                    selectionRect.y2 = mouseY;
                    draw();
                } else if (e.type === 'mousemove' && showPastePreview) {
                    draw(); // Redraw to update ghost position
                }
                return;
            }

            if (e.buttons !== 1 && e.buttons !== 2) {
                lastX = null;
                lastY = null;
                return;
            }

            if (e.type === 'mousedown') {
                saveState();
                lastX = mouseX;
                lastY = mouseY;
            }

            if (tool === 'bucket' && e.buttons === 1) {
                floodFill(mouseX, mouseY);
            } else if (tool === 'brush' && !e.altKey) {
                const dx = Math.abs(mouseX - lastX);
                const dy = Math.abs(mouseY - lastY);
                const sx = (lastX < mouseX) ? 1 : -1;
                const sy = (lastY < mouseY) ? 1 : -1;
                let err = dx - dy;

                let curX = lastX;
                let curY = lastY;

                while (true) {
                    placeBrush(curX, curY, currentLayer, e.buttons);
                    if (curX === mouseX && curY === mouseY) break;
                    const e2 = 2 * err;
                    if (e2 > -dy) { err -= dy; curX += sx; }
                    if (e2 < dx) { err += dx; curY += sy; }
                }
            }

            lastX = mouseX;
            lastY = mouseY;
            draw();
        }

        function handleMouseUp() {
            isSelecting = false; lastX = lastY = null; saveToCache();
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('mousemove', handleInput);
        window.addEventListener('mouseup', handleMouseUp);
        canvas.oncontextmenu = (e) => e.preventDefault();

        window.addEventListener('keydown', e => {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
            const key = e.key.toLowerCase();

            if (key === 'g' && !e.repeat) {
                isGKeyPressed = true;
                hasScrolledWithG = false;
            }

            if (e.altKey && key === 'o') {
                e.preventDefault();
                const isHidden = btnPhotoImportTrigger.style.display === 'none';
                btnPhotoImportTrigger.style.display = isHidden ? 'block' : 'none';
                return;
            }

            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                switch (key) {
                    case 'z': if (e.shiftKey) redo(); else undo(); break;
                    case 'c': copySelection(); break;
                    case 'x': cutSelection(); break;
                    case 'v': pasteSelection(); break;
                    case 'b': exportTileList(); break;
                }
                return;
            }

            if (!e.ctrlKey && !e.metaKey && !e.altKey) {
                switch (key) {
                    case 'r': rotateTile(); break;
                    case 'm': flipTile(); break;
                    case 'b': setTool('brush'); break;
                    case 's': setTool('select'); break;
                    case 'p': setTool('pan'); break;
                    case 'f': setTool('bucket'); break;
                    case 'l': toggleLayer(); break;
                    case 'c': clearMap(); break;
                    case 'd': addBedrockLayers(); break;
                    case 'i': saveAsPNG(); break;
                    case 'w': showWebsiteInfo(); break;
                    case 'k': showKeybind(); break;
                }
            }
        });

        window.addEventListener('keyup', e => {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;

            if (e.key.toLowerCase() === 'g') {
                isGKeyPressed = false;
                if (!hasScrolledWithG) toggleGrid();
            }
        });

        /** Zoom & Grid Division scroll handler. */
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (isGKeyPressed) {
                hasScrolledWithG = true;
                if (!showGrid) showGrid = true;

                if (e.deltaY < 0) { // scroll forward/up
                    if (gridParts !== 0) {
                        gridParts++;
                        if (gridParts >= maxDivision) {
                            gridParts = 0; // Reached max, fully divided
                        }
                    }
                } else { // scroll backward/down
                    if (gridParts === 0) {
                        gridParts = maxDivision - 1;
                    } else if (gridParts > 2) {
                        gridParts--;
                    }
                }
                draw();
                return;
            }
            changeZoom(e.deltaY > 0 ? -0.2 : 0.2, e);
        }, { passive: false });

        /******************************************************************
        * 6. PHOTO TO BLOCKS CONVERSION (IMAGE RECREATION)
       ******************************************************************/

        /**
         * Initialize Photo Preview Pan/Zoom listeners.
         */
        function initPhotoPreviewControls() {
            previewContainer.onwheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                pZoom = Math.min(Math.max(0.1, pZoom + delta), 10);
                updatePhotoTransform();
            };

            previewContainer.onmousedown = (e) => {
                if (e.button === 0) isPanningPhoto = true;
            };

            window.addEventListener('mousemove', (e) => {
                if (isPanningPhoto) {
                    pPanX += e.movementX;
                    pPanY += e.movementY;
                    updatePhotoTransform();
                }
            });

            window.addEventListener('mouseup', () => {
                isPanningPhoto = false;
            });
        }

        function updatePhotoTransform() {
            previewCanvas.style.transform = `translate3d(${pPanX}px, ${pPanY}px, 0) scale(${pZoom})`;
        }

        function resetPhotoTransform() {
            pZoom = 1.0; pPanX = 0; pPanY = 0;
            updatePhotoTransform();
        }

        /**
         * Handles the dimension input changes and ratio locking.
         * Updates the UI ratio text in real-time.
         */
        function handleDimensionChange(axis) {
            let targetW = parseInt(targetWInput.value);
            let targetH = parseInt(targetHInput.value);

            if (isNaN(targetW) || isNaN(targetH)) return;

            if (isRatioLocked && activeProcessingImg) {
                if (axis === 'w') {
                    targetH = Math.round(targetW / originalImgRatio);
                    targetHInput.value = targetH;
                } else {
                    targetW = Math.round(targetH * originalImgRatio);
                    targetWInput.value = targetW;
                }
            }

            updateRatioText();
        }

        /**
         * Toggles the aspect ratio lock state.
         */
        function toggleRatioLock() {
            isRatioLocked = !isRatioLocked;
            lockRatioBtn.innerText = `Lock Ratio: ${isRatioLocked ? 'On' : 'Off'}`;
            lockRatioBtn.classList.toggle('active', isRatioLocked);

            // Re-sync if locking was just turned on
            if (isRatioLocked) handleDimensionChange('w');
        }

        /**
         * Updates the displayed calculated ratio text.
         */
        function updateRatioText() {
            const w = parseInt(targetWInput.value) || 1;
            const h = parseInt(targetHInput.value) || 1;
            const currentRatio = (w / h).toFixed(2);
            ratioDisplay.innerText = `Current: ${currentRatio}:1`;
        }

        /**
         * Handles the image import and opens the processing modal.
         * Resetting input value allows for repeated use of the same file.
         */
        photoImport.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    activeProcessingImg = img;
                    originalImgRatio = img.width / img.height;

                    // Set reference text
                    originalRatioDisplay.innerText = `Original: ${originalImgRatio.toFixed(2)}:1`;

                    // Set default Y and calculate X based on ratio
                    const defaultH = 57;
                    let calculatedW = Math.round(defaultH * originalImgRatio);

                    // Cap at map dimensions
                    if (calculatedW > 100) calculatedW = 100;

                    targetWInput.value = calculatedW;
                    targetHInput.value = defaultH;

                    updateRatioText();

                    photoModal.style.display = 'flex';
                    resetPhotoTransform();
                    updateConversionPreview();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);

            // Clear input so onchange fires even if same file is picked again
            e.target.value = '';
        };

        /**
         * Updates the internal preview within the modal.
         */
        async function updateConversionPreview() {
            if (!activeProcessingImg) return;

            // Enforce caps: COLS (100) and ROWS (60)
            let targetW = Math.min(100, Math.max(1, parseInt(targetWInput.value)));
            let targetH = Math.min(60, Math.max(1, parseInt(targetHInput.value)));

            targetWInput.value = targetW;
            targetHInput.value = targetH;

            if (isNaN(targetW) || isNaN(targetH)) return;

            // Refresh ratio text to ensure sync
            updateRatioText();

            const paletteData = await analyzePalette();
            if (paletteData.length === 0) return;

            // Generate the grid tiles
            currentProcessedTiles = await generateTileData(activeProcessingImg, targetW, targetH, paletteData);

            // Render the preview canvas
            previewCanvas.width = targetW * TILE_SIZE;
            previewCanvas.height = targetH * TILE_SIZE;
            pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);

            currentProcessedTiles.forEach(tile => {
                if (!tile.data) return;
                const cachedImg = imgCache[tile.data.src];
                if (cachedImg && cachedImg.complete) {
                    pCtx.drawImage(cachedImg, tile.offsetX * TILE_SIZE, tile.offsetY * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            });
        }

        /**
         * Closes the modal and resets the processing state.
         */
        function closePhotoModal() {
            photoModal.style.display = 'none';
            activeProcessingImg = null;
            currentProcessedTiles = [];

            // Reset ratio lock UI
            isRatioLocked = false;
            lockRatioBtn.innerText = "Lock Ratio: Off";
            lockRatioBtn.classList.remove('active');
        }

        /**
         * Finalizes the conversion and loads tiles into the clipboard.
         */
        function confirmPhotoImport() {
            if (currentProcessedTiles.length === 0) return;

            clipboard = {
                tiles: currentProcessedTiles,
                width: parseInt(targetWInput.value),
                height: parseInt(targetHInput.value),
                originX: 0,
                originY: 0
            };

            setTool('select');
            showPastePreview = true;
            closePhotoModal();
            draw();
        }

        /**
         * Processes image data into a tile list.
         */
        async function generateTileData(sourceImg, targetW, targetH, paletteData) {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = targetW;
            offCanvas.height = targetH;
            offCtx.drawImage(sourceImg, 0, 0, targetW, targetH);

            const pixelData = offCtx.getImageData(0, 0, targetW, targetH).data;
            const generatedTiles = [];

            for (let y = 0; y < targetH; y++) {
                for (let x = 0; x < targetW; x++) {
                    const idx = (y * targetW + x) * 4;
                    const r = pixelData[idx];
                    const g = pixelData[idx + 1];
                    const b = pixelData[idx + 2];
                    const a = pixelData[idx + 3];

                    if (a < 128) {
                        generatedTiles.push({ offsetX: x, offsetY: y, data: null });
                        continue;
                    }

                    const closestTileSrc = findClosestTile(r, g, b, paletteData);
                    generatedTiles.push({
                        offsetX: x,
                        offsetY: y,
                        data: { src: closestTileSrc, rotation: 0, flipped: false }
                    });
                }
            }
            return generatedTiles;
        }

        /**
         * Analyzes all tiles currently in the palette.
         * Filters out tiles that have transparency (holes) and calculates average RGB.
         */
        async function analyzePalette() {
            const results = [];
            const imgs = document.querySelectorAll('#tilePalette img');

            const sampleCanvas = document.createElement('canvas');
            const sCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
            sampleCanvas.width = sampleCanvas.height = 16; // Small sample for speed

            for (const img of imgs) {
                sCtx.clearRect(0, 0, 16, 16);
                sCtx.drawImage(img, 0, 0, 16, 16);
                const data = sCtx.getImageData(0, 0, 16, 16).data;

                let r = 0, g = 0, b = 0, solidCount = 0;
                let isSolid = true;

                for (let i = 0; i < data.length; i += 4) {
                    // "Hole" detection: If any sampled pixel is transparent, we reject the block
                    if (data[i + 3] < 255) {
                        isSolid = false;
                        break;
                    }
                    r += data[i];
                    g += data[i + 1];
                    b += data[i + 2];
                    solidCount++;
                }

                if (isSolid && solidCount > 0) {
                    results.push({
                        src: img.src,
                        r: r / solidCount,
                        g: g / solidCount,
                        b: b / solidCount
                    });
                }
            }
            return results;
        }

        /**
         * Uses Euclidean distance to find the tile that matches the target RGB best.
         */
        function findClosestTile(tr, tg, tb, palette) {
            let minDistance = Infinity;
            let closestSrc = palette[0].src;

            for (const tile of palette) {
                const d = Math.sqrt(
                    Math.pow(tr - tile.r, 2) +
                    Math.pow(tg - tile.g, 2) +
                    Math.pow(tb - tile.b, 2)
                );
                if (d < minDistance) {
                    minDistance = d;
                    closestSrc = tile.src;
                }
            }
            return closestSrc;
        }

        /******************************************************************
         * 7. I/O & STATE MANAGEMENT
         ******************************************************************/
        function showLoading(text) {
            loadingText.innerText = text;
            progressBar.style.width = '0%';
            loadingOverlay.style.display = 'flex';
            loadingOverlay.style.opacity = '1';
        }

        function hideLoading() {
            loadingOverlay.style.opacity = '0';
            setTimeout(() => loadingOverlay.style.display = 'none', 500);
        }

        function saveToCache() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                try {
                    const manifest = [];
                    const srcToId = {};

                    const getTileId = (src) => {
                        if (srcToId[src] === undefined) {
                            srcToId[src] = manifest.length;
                            manifest.push(src);
                        }
                        return srcToId[src];
                    };

                    const compressLayer = (layer) => {
                        const compressed = {};
                        if (!layer) return compressed;
                        for (let coord in layer) {
                            const tile = layer[coord];
                            // Save ONLY the base source map to retain grouping naturally
                            compressed[coord] = {
                                i: getTileId(tile.src),
                                r: tile.rotation,
                                f: tile.flipped ? 1 : 0
                            };
                        }
                        return compressed;
                    };

                    const payload = {
                        v: 2,
                        m: manifest,
                        bg: compressLayer(mapData.background),
                        fg: compressLayer(mapData.foreground),
                        wt: compressLayer(mapData.water)
                    };

                    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
                } catch (e) {
                    console.warn("Storage limit exceeded.");
                }
            }, 1000);
        }

        function loadFromCache() {
            const cached = localStorage.getItem(STORAGE_KEY);
            if (!cached) return false;

            try {
                const parsed = JSON.parse(cached);

                if (!parsed.v || parsed.v < 2) {
                    if (parsed.background && parsed.foreground) {
                        mapData = {
                            background: parsed.background,
                            foreground: parsed.foreground,
                            water: parsed.water || {}
                        };
                        return true;
                    }
                    return false;
                }
                const manifest = parsed.m;
                const decompressLayer = (compressed) => {
                    const layer = {};
                    if (!compressed) return layer;
                    for (let coord in compressed) {
                        const tile = compressed[coord];
                        layer[coord] = {
                            src: manifest[tile.i],
                            rotation: tile.r,
                            flipped: tile.f === 1
                        };
                    }
                    return layer;
                };

                mapData = {
                    background: decompressLayer(parsed.bg),
                    foreground: decompressLayer(parsed.fg),
                    water: decompressLayer(parsed.wt)
                };

                return true;
            } catch (e) {
                return false;
            }
        }

        function saveState() {
            history.push(JSON.stringify(mapData));
            if (history.length > 30) history.shift();
            redoStack = [];
            saveToCache();
        }

        function undo() {
            if (history.length > 0) {
                redoStack.push(JSON.stringify(mapData));
                mapData = JSON.parse(history.pop());
                draw();
                saveToCache();
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                history.push(JSON.stringify(mapData));
                mapData = JSON.parse(redoStack.pop());
                draw();
                saveToCache();
            }
        }

        function saveAsPNG() {
            const a = document.createElement('a'); a.download = 'world_render.png';
            a.href = canvas.toDataURL(); a.click();
        }

        function exportMapFile() {
            const dataStr = JSON.stringify(mapData);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'world_data.map';
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportTileList() {
            const counts = {};
            const layers = ['background', 'foreground', 'water'];

            layers.forEach(layerName => {
                const layer = mapData[layerName];
                if (!layer) return;

                for (let coord in layer) {
                    const tile = layer[coord];
                    // Since we only ever store the base tile src in mapData, 
                    // autotile variants natively bundle and count under the base block!
                    const name = (tileNameLookup[tile.src] || "Unknown");
                    counts[name] = (counts[name] || 0) + 1;
                }
            });

            let output = "Tiles used:\n";
            for (const [name, count] of Object.entries(counts)) {
                output += `${name} - ${count}\n`;
            }

            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'used_block_list.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        bgUpload.onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { bgImage = img; draw(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        tileUpload.onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const src = ev.target.result;
                    const tileName = file.name.split('.')[0];
                    tileNameLookup[src] = tileName;

                    // Check for autotiling variants
                    const nameMatches = tileName.match(/^(.*)_(\d+)$/);

                    if (nameMatches) {
                        const baseName = nameMatches[1];
                        const mask = nameMatches[2];

                        if (!autotileMap[baseName]) autotileMap[baseName] = {};
                        autotileMap[baseName][mask] = src;

                        imgCache[src] = new Image();
                        imgCache[src].src = src;
                    } else {
                        // Add to standard visible palette
                        const img = document.createElement('img');
                        img.src = src;
                        img.title = tileName;
                        img.onclick = () => selectTile(img.src, img);
                        tilePalette.appendChild(img);

                        imgCache[src] = new Image();
                        imgCache[src].src = src;
                    }
                };
                reader.readAsDataURL(file);
            });
        };

        mapImport.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoading("Importing World Data...");

            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const importedData = JSON.parse(ev.target.result);
                    if (importedData.background && importedData.foreground) {
                        saveState();
                        mapData = {
                            background: importedData.background,
                            foreground: importedData.foreground,
                            water: importedData.water || {}
                        };

                        await prewarmMapCache();

                        draw();
                        saveToCache();

                        setTimeout(hideLoading, 500);
                    } else {
                        hideLoading();
                        alert("Invalid map file format.");
                    }
                } catch (err) {
                    hideLoading();
                    alert("Error reading file: " + err.message);
                }
            };
            reader.readAsText(file);
        };

        function showInfo() {
            isInfoVisible = !isInfoVisible;
            infoForm.style.display = (isInfoVisible) ? "block" : "none";
        }

        function displayPopUp(body = "", header = "", end = "") {
            headerTextEl.innerText = header;
            bodyTextEl.innerText = body;
            endTextEl.innerText = end;
            showInfo();
        }

        function showKeybind() {
            displayPopUp(
                "Draw: Left Click \n Erase: Right Click \n Zoom: Scroll Wheel \n Eyedropper: Alt + Left Click \n Undo: Ctrl + z \n Redo: Ctrl + Shift + z \n Copy: Ctrl + c \n Cut: Ctrl + x \n Paste: Ctrl + v \n Export Block List: Ctrl + b \n brush: b \n Select: s \n Pan: p \n Fill: f \n Rotate: r \n Mirror: m \n Toggle Grid: g \n Adjust Grid: hold g and scroll \n Toggle Layer: l \n Clear World: c \n Add Bedrock Layer: d \n Save World Image: i \n Info: w \n Keybind: k",
                "Keybinds:",
            );
        }

        function showWebsiteInfo() {
            displayPopUp(
                "Latest Features: \n Pre-rendering textures, \n more blocks, a secret feature, \n some autotiling! \n\n If you have suggestions, \n dm me in discord!",
                "Version 2.0",
                "Website by: Onyx"
            );
        }
